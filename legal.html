<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">

<style>
  :root {
    color-scheme: light !important;
    forced-color-adjust: none;
    --bg: #FFFFFF;
    --bg-soft: #FAFBFD;
    --ink: #0A0E1A;
    --ink-2: #2A2F3D;
    --ink-3: #5A6172;
    --ink-4: #8B92A3;
    --line: rgba(10, 14, 26, 0.06);
    --line-strong: rgba(10, 14, 26, 0.12);
    --primary: #FF1F3D;
    --tx-display: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    --tx-body: 'Pretendard', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --tx-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background-color: #FFFFFF !important;
    color: #0A0E1A !important;
    background: #FFFFFF !important;
    font-family: var(--tx-body);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.6;
    letter-spacing: -0.005em;
  }

  /* ============ NAV (mirrors main page gradient) ============ */
  .nav-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9000;
    padding: 14px 0 28px;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(255, 255, 255, 0.92) 0%,
        rgba(255, 255, 255, 0.85) 30%,
        rgba(255, 255, 255, 0.6) 60%,
        rgba(255, 255, 255, 0.2) 85%,
        rgba(255, 255, 255, 0) 100%);
  }
  .nav {
    max-width: 1200px;
    margin: 0 auto;
    padding: 6px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: auto;
  }
  .logo {
    display: flex;
    align-items: center;
    text-decoration: none;
  }
  .logo img {
    height: 28px;
    width: auto;
    display: block;
  }
  .nav-back {
    font-size: 13px;
    color: var(--ink-3);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s ease;
  }
  .nav-back:hover { color: var(--ink); }

  /* Push content below fixed nav */
  body { padding-top: 70px; }

  /* ============ HERO ============ */
  .legal-hero {
    text-align: center;
    padding: 80px 24px 40px;
    max-width: 800px;
    margin: 0 auto;
  }
  .legal-hero-logo {
    height: 64px;
    margin: 0 auto 32px;
    display: flex;
    justify-content: center;
  }
  .legal-hero-logo img { height: 100%; width: auto; display: block; }
  .legal-hero-title {
    font-family: var(--tx-display);
    font-weight: 900;
    font-size: 44px;
    letter-spacing: -0.04em;
    color: var(--ink);
    line-height: 1.05;
    margin-bottom: 12px;
  }
  .legal-hero-sub {
    color: var(--ink-3);
    font-size: 14px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ============ LANG + TAB SWITCHER ============ */
  .legal-controls {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  .lang-switcher {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lang-btn {
    background: transparent;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-3);
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: var(--tx-body);
  }
  .lang-btn:hover {
    border-color: var(--ink);
    color: var(--ink);
  }
  .lang-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: white;
  }

  .tab-switcher {
    display: inline-flex;
    background: #F0F2F5;
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
  }
  .tab-btn {
    background: transparent;
    border: none;
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-3);
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.2s ease;
    font-family: var(--tx-body);
    letter-spacing: -0.01em;
  }
  .tab-btn.active {
    background: white;
    color: var(--ink);
    box-shadow: 0 1px 3px rgba(10, 14, 26, 0.08), 0 0 0 0.5px rgba(10, 14, 26, 0.04);
  }

  /* ============ CONTENT ============ */
  .legal-content {
    max-width: 720px;
    margin: 0 auto;
    padding: 12px 28px 100px;
  }

  .legal-section { display: none; }
  .legal-section.active { display: block; }

  .legal-content h2 {
    font-family: var(--tx-display);
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.025em;
    color: var(--ink);
    margin: 40px 0 16px;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  .legal-content h2:first-of-type {
    margin-top: 0;
    padding-top: 0;
    border-top: none;
  }
  .legal-content p {
    color: var(--ink-2);
    font-size: 15px;
    line-height: 1.75;
    margin-bottom: 16px;
  }
  .legal-content ol, .legal-content ul {
    margin: 8px 0 20px 24px;
    color: var(--ink-2);
    font-size: 15px;
    line-height: 1.85;
  }
  .legal-content li {
    margin-bottom: 4px;
  }
  .legal-content .strong-block {
    font-weight: 600;
    color: var(--ink);
    margin-top: 24px;
  }
  .legal-content .contact-block {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px 24px;
    margin: 24px 0;
  }
  .legal-content .contact-block p {
    margin-bottom: 4px;
    font-size: 14px;
  }
  .legal-content .contact-block .label {
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .legal-content a {
    color: var(--primary);
    text-decoration: none;
  }
  .legal-content a:hover { text-decoration: underline; }
  .legal-content .updated {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 13px;
    color: var(--ink-4);
    font-style: italic;
  }

  /* ============ FOOTER ============ */
  .legal-footer {
    border-top: 1px solid var(--line);
    padding: 40px 24px 60px;
    text-align: center;
    color: var(--ink-4);
    font-size: 12px;
  }
  .legal-footer p { margin-bottom: 4px; }
  .legal-footer .tagline {
    font-family: var(--tx-display);
    font-weight: 800;
    font-size: 16px;
    color: var(--ink);
    letter-spacing: -0.02em;
    margin-bottom: 20px;
  }
  .legal-footer a { color: var(--ink-3); text-decoration: none; }
  .legal-footer a:hover { color: var(--ink); }

  /* ============ MOBILE ============ */
  @media (max-width: 720px) {
    .legal-hero { padding: 48px 20px 32px; }
    .legal-hero-logo { height: 48px; margin-bottom: 24px; }
    .legal-hero-title { font-size: 32px; }
    .legal-hero-sub { font-size: 12px; }
    .legal-controls { padding: 0 20px 24px; }
    .tab-btn { padding: 8px 18px; font-size: 13px; }
    .legal-content { padding: 8px 20px 60px; }
    .legal-content h2 { font-size: 20px; margin: 32px 0 14px; }
    .legal-content p, .legal-content ol, .legal-content ul { font-size: 14px; }
  }
</style>
</head>

  // ============================================================
  // Helpers
  // ============================================================
  const langToHtml = { KOR: 'ko', EN: 'en', JP: 'ja', CN: 'zh', Esp: 'es' };

  function detectInitialLocale() {
    try {
      const saved = localStorage.getItem('fndm-locale');
      if (saved && CONTENT[saved]) return saved;
    } catch (e) {}
    const langs = navigator.languages || [navigator.language || 'en'];
    for (const raw of langs) {
      const l = raw.toLowerCase();
      if (l.startsWith('ko')) return 'KOR';
      if (l.startsWith('ja')) return 'JP';
      if (l.startsWith('zh')) return 'CN';
      if (l.startsWith('es')) return 'Esp';
      if (l.startsWith('en')) return 'EN';
    }
    return 'EN';
  }

  function getInitialTab() {
    const hash = (window.location.hash || '').replace('#', '').toLowerCase();
    if (hash === 'terms') return 'terms';
    return 'privacy';
  }

  let currentLang = detectInitialLocale();
  let currentTab = getInitialTab();

  function apply() {
    const dict = CONTENT[currentLang] || CONTENT.EN;
    // Update static i18n
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (dict[key]) el.innerHTML = dict[key];
    });
    // Content
    document.getElementById('legalContent').innerHTML = dict[currentTab] || '';
    // <html lang>
    document.documentElement.lang = langToHtml[currentLang] || 'en';
    // Lang buttons
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === currentLang);
    });
    // Tab buttons
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === currentTab);
    });
    // Update hash
    if (currentTab !== getInitialTab()) {
      history.replaceState(null, '', '#' + currentTab);
    }
    // Title
    document.title = 'FNDM | ' + (dict['legal.tab.' + currentTab] || 'Legal');
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentLang = btn.dataset.lang;
      try { localStorage.setItem('fndm-locale', currentLang); } catch (e) {}
      apply();
    });
  });

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      apply();
    });
  });

  // Initial
  apply();
</script>
